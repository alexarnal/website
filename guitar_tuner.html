<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tuner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #0f1114;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    color: #e8e8e8;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* ---- gauge section ---- */
  .gauge-section {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }

  .gauge-container {
    width: 100%;
    max-width: 320px;
    aspect-ratio: 300 / 170;
    position: relative;
  }

  svg.gauge { width: 100%; height: 100%; overflow: visible; }

  .tick { stroke: #333; stroke-width: 2; stroke-linecap: round; }
  .tick.major { stroke: #555; stroke-width: 2.5; }
  .tick.center { stroke: #4ade80; stroke-width: 3; }

  .needle {
    transform-origin: 150px 150px;
    transition: transform 0.08s ease-out;
  }
  .needle-line { stroke: #e8e8e8; stroke-width: 3; stroke-linecap: round; }
  .needle-dot { fill: #e8e8e8; }
  .needle.in-tune .needle-line { stroke: #4ade80; }
  .needle.in-tune .needle-dot { fill: #4ade80; }
  .needle.off .needle-line { stroke: #fb923c; }
  .needle.off .needle-dot { fill: #fb923c; }

  .arc-label {
    fill: #444;
    font-size: 9px;
    font-family: -apple-system, sans-serif;
    text-anchor: middle;
  }

  /* ---- note display ---- */
  .note-display {
    text-align: center;
    margin-top: 8px;
  }

  .note-name {
    font-size: 80px;
    font-weight: 700;
    letter-spacing: -3px;
    line-height: 1;
    color: #e8e8e8;
    transition: color 0.15s;
  }
  .note-name.in-tune { color: #4ade80; }
  .note-name.off { color: #fb923c; }

  .freq-line {
    font-size: 14px;
    color: #666;
    margin-top: 4px;
    height: 20px;
    font-variant-numeric: tabular-nums;
  }

  /* ---- cents bar ---- */
  .cents-bar-wrap {
    width: 100%;
    max-width: 280px;
    margin: 16px auto 0;
  }

  .cents-bar {
    height: 6px;
    background: #1a1d21;
    border-radius: 3px;
    position: relative;
    overflow: visible;
  }

  .cents-bar-center {
    position: absolute;
    left: 50%;
    top: -3px;
    width: 2px;
    height: 12px;
    background: #333;
    transform: translateX(-50%);
    border-radius: 1px;
  }

  .cents-bar-fill {
    position: absolute;
    top: 0;
    height: 100%;
    background: #fb923c;
    border-radius: 3px;
    transition: left 0.08s ease-out, width 0.08s ease-out, background 0.15s;
  }
  .cents-bar-fill.in-tune { background: #4ade80; }

  .cents-label {
    text-align: center;
    font-size: 12px;
    color: #555;
    margin-top: 8px;
    height: 18px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-variant-numeric: tabular-nums;
  }
  .cents-label.in-tune { color: #4ade80; }

  /* ---- strings guide ---- */
  .strings-section {
    flex: 0 0 auto;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
  }

  .strings-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
    margin-bottom: 12px;
  }

  .string-cell {
    text-align: center;
    padding: 10px 0;
    border-radius: 10px;
    background: #1a1d21;
    transition: background 0.15s, transform 0.1s;
  }

  .string-num {
    font-size: 10px;
    color: #555;
    margin-bottom: 2px;
  }

  .string-note {
    font-size: 20px;
    font-weight: 600;
    color: #888;
    transition: color 0.15s;
  }

  .string-hz {
    font-size: 9px;
    color: #444;
    margin-top: 1px;
    font-variant-numeric: tabular-nums;
  }

  .string-cell.active {
    background: #261d0f;
  }
  .string-cell.active .string-note { color: #fb923c; }

  .string-cell.match {
    background: #0f2618;
  }
  .string-cell.match .string-note { color: #4ade80; }

  /* ---- power button ---- */
  .power-btn {
    display: block;
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 12px;
    background: #1a1d21;
    color: #888;
    font-size: 15px;
    font-weight: 500;
    font-family: inherit;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .power-btn:active { background: #222; }
  .power-btn.on {
    background: #1c2820;
    color: #4ade80;
  }

  /* ---- desktop ---- */
  @media (min-width: 600px) {
    body { display: flex; align-items: center; justify-content: center; }
    .app {
      height: auto;
      min-height: 600px;
      max-height: 800px;
      padding: 40px 30px 30px;
      background: #16181c;
      border-radius: 24px;
      margin: 20px;
    }
  }
</style>
</head>
<body>

<div class="app">
  <div class="gauge-section">
    <div class="gauge-container">
      <svg class="gauge" viewBox="0 0 300 170">
        <g id="ticks"></g>
        <g class="needle" id="needle">
          <line class="needle-line" x1="150" y1="150" x2="150" y2="30"/>
          <circle class="needle-dot" cx="150" cy="150" r="5"/>
        </g>
      </svg>
    </div>

    <div class="note-display">
      <div class="note-name" id="note">&mdash;</div>
      <div class="freq-line" id="freq"></div>
    </div>

    <div class="cents-bar-wrap">
      <div class="cents-bar">
        <div class="cents-bar-center"></div>
        <div class="cents-bar-fill" id="centsFill"></div>
      </div>
      <div class="cents-label" id="centsLabel"></div>
    </div>
  </div>

  <div class="strings-section">
    <div class="strings-grid" id="stringsGrid"></div>
    <button class="power-btn" id="powerBtn">Start tuning</button>
  </div>
</div>

<script>
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

const STANDARD = [
  { str: 6, note: 'E', freq: 82.41, label: 'low' },
  { str: 5, note: 'A', freq: 110.00 },
  { str: 4, note: 'D', freq: 146.83 },
  { str: 3, note: 'G', freq: 196.00 },
  { str: 2, note: 'B', freq: 246.94 },
  { str: 1, note: 'E', freq: 329.63, label: 'high' },
];

function drawTicks() {
  const g = document.getElementById('ticks');
  const cx = 150, cy = 150, rO = 125, rI = 108;
  for (let c = -50; c <= 50; c += 5) {
    const isMajor = c % 10 === 0;
    const isCenter = c === 0;
    if (!isMajor && !isCenter) continue;
    const angle = (c / 50) * 60;
    const rad = (angle - 90) * Math.PI / 180;
    const r2 = isCenter ? rI - 12 : isMajor ? rI : rI + 6;
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', cx + rO * Math.cos(rad));
    line.setAttribute('y1', cy + rO * Math.sin(rad));
    line.setAttribute('x2', cx + r2 * Math.cos(rad));
    line.setAttribute('y2', cy + r2 * Math.sin(rad));
    line.setAttribute('class', isCenter ? 'tick center' : isMajor ? 'tick major' : 'tick');
    g.appendChild(line);
  }
  [{c: -50, t: '-50'}, {c: -25, t: '-25'}, {c: 0, t: '0'}, {c: 25, t: '+25'}, {c: 50, t: '+50'}].forEach(({c, t}) => {
    const rad = ((c / 50) * 60 - 90) * Math.PI / 180;
    const r = 90;
    const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    txt.setAttribute('x', cx + r * Math.cos(rad));
    txt.setAttribute('y', cy + r * Math.sin(rad) + 3);
    txt.setAttribute('class', 'arc-label');
    txt.textContent = t;
    g.appendChild(txt);
  });
}
drawTicks();

function buildStrings() {
  const grid = document.getElementById('stringsGrid');
  STANDARD.forEach(s => {
    const cell = document.createElement('div');
    cell.className = 'string-cell';
    cell.id = 'str-' + s.str;
    cell.innerHTML = `<div class="string-num">${s.str}</div><div class="string-note">${s.note}</div><div class="string-hz">${s.freq.toFixed(0)}</div>`;
    grid.appendChild(cell);
  });
}
buildStrings();

function highlightString(freq) {
  STANDARD.forEach(s => {
    const el = document.getElementById('str-' + s.str);
    el.classList.remove('active', 'match');
  });
  if (!freq) return;
  let best = null, bestD = Infinity;
  STANDARD.forEach(s => { const d = Math.abs(freq - s.freq); if (d < bestD) { bestD = d; best = s; } });
  if (!best) return;
  const el = document.getElementById('str-' + best.str);
  const off = 1200 * Math.log2(freq / best.freq);
  el.classList.add(Math.abs(off) < 8 ? 'match' : 'active');
}

let audioCtx, analyser, source, mediaStream, running = false, rafId = null;

const needleEl  = document.getElementById('needle');
const noteEl    = document.getElementById('note');
const freqEl    = document.getElementById('freq');
const fillEl    = document.getElementById('centsFill');
const labelEl   = document.getElementById('centsLabel');
const btn       = document.getElementById('powerBtn');

function freqToNote(freq) {
  const semi = 12 * Math.log2(freq / 440);
  const rounded = Math.round(semi);
  const cents = (semi - rounded) * 100;
  let idx = (rounded + 9) % 12;
  if (idx < 0) idx += 12;
  return { name: NOTE_NAMES[idx], cents };
}

function autoCorrelate(buf, sr) {
  const N = buf.length;
  let rms = 0;
  for (let i = 0; i < N; i++) rms += buf[i] * buf[i];
  rms = Math.sqrt(rms / N);
  if (rms < 0.01) return -1;

  let r1 = 0, r2 = N - 1;
  for (let i = 0; i < N / 2; i++) { if (Math.abs(buf[i]) > 0.2) { r1 = i; break; } }
  for (let i = 1; i < N / 2; i++) { if (Math.abs(buf[N - i]) > 0.2) { r2 = N - i; break; } }

  const trimmed = buf.slice(r1, r2);
  const n = trimmed.length;
  const c = new Array(n).fill(0);
  for (let lag = 0; lag < n; lag++) {
    let sum = 0;
    for (let i = 0; i < n - lag; i++) sum += trimmed[i] * trimmed[i + lag];
    c[lag] = sum;
  }

  let d = 0;
  while (d < n - 1 && c[d] > c[d + 1]) d++;

  let maxVal = -1, maxPos = -1;
  for (let i = d; i < n; i++) { if (c[i] > maxVal) { maxVal = c[i]; maxPos = i; } }
  if (maxPos <= 0) return -1;

  let T = maxPos;
  const x1 = c[T - 1] || 0, x2 = c[T], x3 = c[T + 1] || 0;
  const a = (x1 + x3 - 2 * x2) / 2;
  const b = (x3 - x1) / 2;
  if (a) T -= b / (2 * a);
  return sr / T;
}

function update() {
  const buf = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buf);
  const freq = autoCorrelate(buf, audioCtx.sampleRate);

  if (freq > 60 && freq < 1200) {
    const info = freqToNote(freq);
    const clamped = Math.max(-50, Math.min(50, info.cents));
    const inTune = Math.abs(info.cents) < 3;

    noteEl.textContent = info.name;
    noteEl.className = 'note-name' + (inTune ? ' in-tune' : ' off');
    freqEl.textContent = freq.toFixed(1) + ' Hz';

    const angle = (clamped / 50) * 60;
    needleEl.style.transform = `rotate(${angle}deg)`;
    needleEl.className = 'needle' + (inTune ? ' in-tune' : ' off');

    const pct = ((clamped + 50) / 100) * 100;
    const center = 50;
    if (inTune) {
      fillEl.style.left = (center - 1.5) + '%';
      fillEl.style.width = '3%';
      fillEl.className = 'cents-bar-fill in-tune';
    } else {
      const lo = Math.min(pct, center);
      const hi = Math.max(pct, center);
      fillEl.style.left = lo + '%';
      fillEl.style.width = (hi - lo) + '%';
      fillEl.className = 'cents-bar-fill';
    }

    if (inTune) {
      labelEl.textContent = 'In tune';
      labelEl.className = 'cents-label in-tune';
    } else {
      const dir = info.cents > 0 ? 'sharp' : 'flat';
      labelEl.textContent = Math.abs(info.cents).toFixed(0) + ' cents ' + dir;
      labelEl.className = 'cents-label';
    }

    highlightString(freq);
  } else {
    needleEl.className = 'needle';
    needleEl.style.transform = 'rotate(0deg)';
    fillEl.style.width = '0%';
    highlightString(null);
  }

  rafId = requestAnimationFrame(update);
}

async function start() {
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } });
  } catch {
    labelEl.textContent = 'Mic blocked';
    return;
  }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  source = audioCtx.createMediaStreamSource(mediaStream);
  source.connect(analyser);
  running = true;
  btn.textContent = 'Stop';
  btn.classList.add('on');
  update();
}

function stop() {
  running = false;
  if (rafId) cancelAnimationFrame(rafId);
  if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
  if (audioCtx) audioCtx.close();
  noteEl.textContent = '—';
  noteEl.className = 'note-name';
  freqEl.textContent = '';
  labelEl.textContent = '';
  labelEl.className = 'cents-label';
  fillEl.style.width = '0%';
  needleEl.style.transform = 'rotate(0deg)';
  needleEl.className = 'needle';
  highlightString(null);
  btn.textContent = 'Start tuning';
  btn.classList.remove('on');
}

btn.addEventListener('click', () => { running ? stop() : start(); });
</script>
</body>
</html>
